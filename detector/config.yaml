# Log path (matches the mounted volume)
log_path: /var/log/nginx/hng-access.log

# Sliding window
sliding_window_seconds: 60

# Baseline
baseline_window_minutes: 30
baseline_recalc_interval_seconds: 60
baseline_min_samples: 10          # minimum samples before baseline is trusted

# Anomaly detection thresholds
zscore_threshold: 3.0
rate_multiplier_threshold: 5.0    # flag if rate > 5x mean

# Error surge
error_surge_multiplier: 3.0       # tighten thresholds if 4xx/5xx is 3x baseline

# Unban backoff schedule (in seconds)
unban_schedule:
  - 600       # 10 minutes
  - 1800      # 30 minutes
  - 7200      # 2 hours
  - permanent

# Slack
slack_webhook_url: "SLACK_WEBHOOK_URL"

# Dashboard
dashboard_port: 8080
dashboard_refresh_seconds: 3

# Audit log
audit_log_path: /app/hng-audit.log
