worker_processes auto;

events {
    worker_connections 1024;
}

http {
    # Use X-Forwarded-For if present, otherwise fall back to remote_addr
    map $http_x_forwarded_for $real_client_ip {
        ""      $remote_addr;
        default $http_x_forwarded_for;
    }

    log_format json_log escape=json
        '{'
            '"source_ip":"$real_client_ip",'
            '"timestamp":"$time_iso8601",'
            '"method":"$request_method",'
            '"path":"$request_uri",'
            '"status":$status,'
            '"response_size":$body_bytes_sent,'
            '"http_host":"$host",'
            '"user_agent":"$http_user_agent",'
            '"request_time":$request_time'
        '}';

    # Trust X-Forwarded-For from these — covers AWS, local Docker
    set_real_ip_from  10.0.0.0/8;
    set_real_ip_from  172.16.0.0/12;
    set_real_ip_from  192.168.0.0/16;
    real_ip_header    X-Forwarded-For;
    real_ip_recursive on;

    # Write JSON logs to the shared volume path
    access_log /var/log/nginx/hng-access.log json_log;
    error_log  /var/log/nginx/error.log warn;

    server {
        listen 80;
        server_name _;

        # Forward everything to Nextcloud
        location / {
            proxy_pass         http://nextcloud:80;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            proxy_connect_timeout 60s;
            proxy_send_timeout    60s;
            proxy_read_timeout    60s;

            # Required for Nextcloud large file uploads
            client_max_body_size 512M;
            proxy_request_buffering off;
        }
    }
}
